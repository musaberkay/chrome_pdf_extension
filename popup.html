<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Tools</title>
    <link rel="stylesheet" href="assets/css/popup.css" />
  </head>
  <body>
    <main class="app">
      <section id="viewHome" class="view view--home">
        <p class="open-tab-row">
          <button type="button" id="openTabBtn" class="btn-open-tab">Open in full tab</button>
        </p>
        <header class="header header--home">
          <h1>PDF Tools</h1>
          <p class="subtitle">All processing happens on your device.</p>
        </header>

        <div class="tool-grid" role="navigation" aria-label="PDF tools">
          <button type="button" class="tool-card" data-tool="merge">
            <span class="tool-card__icon tool-card__icon--merge" aria-hidden="true">
              <img src="assets/images/merge.svg" width="48" height="48" alt="" />
            </span>
            <span class="tool-card__title">Merge PDF</span>
            <span class="tool-card__desc"
              >Combine PDFs in the order you want with the easiest PDF merger available.</span
            >
          </button>

          <button type="button" class="tool-card" data-tool="word">
            <span class="tool-card__icon tool-card__icon--word" aria-hidden="true">
              <img src="assets/images/pdf-to-word.svg" width="48" height="48" alt="" />
            </span>
            <span class="tool-card__title">PDF to Word</span>
            <span class="tool-card__desc"
              >Convert your PDF files into easy to edit DOC and DOCX documents.</span
            >
          </button>
        </div>
      </section>

      <section id="viewWorkspace" class="view view--workspace" hidden>
        <button type="button" class="tool-back" id="backBtn">← All tools</button>
        <h2 class="workspace-title" id="workspaceTitle">Merge PDF</h2>
        <p class="workspace-desc" id="workspaceDesc"></p>

        <div id="conversionSettings" class="conversion-settings" hidden>
          <p class="conversion-settings__title">Better quality (optional)</p>
          <label class="conversion-settings__label">
            ConvertAPI key <span class="conversion-settings__hint">— free, no install · <strong>convertapi.com</strong></span>
            <input type="password" id="convertApiKey" placeholder="Paste your secret key" class="conversion-settings__input" />
          </label>
          <label class="conversion-settings__label">
            Local server URL <span class="conversion-settings__hint">— run <code>local-server.py</code> or Stirling PDF</span>
            <input type="url" id="stirlingUrl" placeholder="http://localhost:8765" class="conversion-settings__input" />
          </label>
        </div>

        <div class="drop-zone" id="dropZone">
          <label class="drop-zone__label">
            <input
              id="fileInput"
              type="file"
              accept="application/pdf,.pdf"
              multiple
              hidden
            />
            <span class="drop-zone__title">Drag PDF files here</span>
            <span class="drop-zone__hint">or click to browse</span>
          </label>
        </div>

        <ul id="fileList" class="file-list" aria-live="polite"></ul>

        <div class="actions">
          <button type="button" id="mergeBtn" class="btn btn--primary" disabled hidden>
            Merge PDF
          </button>
          <button type="button" id="wordBtn" class="btn btn--secondary" disabled hidden>
            PDF → Word
          </button>
          <button type="button" id="clearBtn" class="btn btn--ghost" disabled>Clear</button>
        </div>

        <p id="status" class="status" role="status"></p>
      </section>
    </main>
    <script src="src/open-tab.js"></script>
    <script src="bundle.js"></script>
  </body>
</html>
